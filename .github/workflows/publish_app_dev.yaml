name: app-build-action-dev

on:
  workflow_dispatch:
  push:
    tags:
      - "dev_v*"

jobs:
  build-ios-macos:
    runs-on: macos-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && 'dev' || github.ref }}

      - name: Flutter action
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.38.x"
          cache: true

      - name: Enable Flutter macOS Desktop
        run: flutter config --enable-macos-desktop

      - name: Restore packages
        run: |
          cd simple_live_app
          flutter pub get

      - name: Build iOS unsigned IPA
        run: |
          cd simple_live_app
          flutter build ios --release --no-codesign
          mkdir -p build/ios/iphoneos/Payload
          cp -R build/ios/iphoneos/Runner.app build/ios/iphoneos/Payload/Runner.app
          cd build/ios/iphoneos/
          zip -q -r ios_no_sign.ipa Payload

      - name: Upload iOS IPA to Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ios
          path: simple_live_app/build/ios/iphoneos/ios_no_sign.ipa

      - name: Build macOS
        run: |
          cd simple_live_app
          flutter build macos --release
          ditto -c -k --sequesterRsrc --keepParent "build/macos/Build/Products/Release/Simple Live.app" "build/macos/Simple-Live-macos.zip"

      - name: Upload macOS to Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mac
          path: simple_live_app/build/macos/Simple-Live-macos.zip

      - run: echo "iOS/macOS dev build status is ${{ job.status }}."
